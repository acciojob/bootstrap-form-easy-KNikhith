<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
	<!-- the entire body must be written by student -->
	<form class=" container  mt-5 needs-validation" novalidate>
		<h1 class="text-center mb-5">Internship Form</h1>
		<div class="row g-3">
			<div class="col-md-4">
				<label for="first-name-input" class="form-label">First Name</label>
				<input id="first-name-input" class="form-control"type=text required>
				<div class="invalid-feedback">
					First name required!
				</div>
			</div>
			<div class="col-md-4">
				<label class="form-lable" for="last-name-input">Last Name</label>
				<input id="last-name-input" class="form-control" type=text required>
				<div class="invalid-feedback">
					Last name required!
				</div>
			</div>
			<div class="col-md-4">
				<label class="form-label" for="email-input">Email Address</label>
				<input id="email-input" type=email class="form-control" required>
				<div class="invalid-feedback">
					Email required!
				</div>
			</div>
			<div class="col-md-4">
				<label class="form-label" for="college-input">College</label>
				<input id="college-input" type=text class="form-control" required>
				<div class="invalid-feedback">
					Please provide a valid college.
				</div>
			</div>
			<div class="col-md-4">
				<label for="grad-year-select" class="form-label">Graduation Year</label>
				<select class="form-select" id="grad-year-select" required>
					<option selected disabled>Choose...</option>
					<option>2020</option>
					<option>2021</option>
					<option>2022</option>
					<option>2023</option>
				</select>
				<div class="invalid-feedback">
					Please select a valid Graducation Year.
				</div>
			</div>
			<div class="col-md-4">
				<label for="roll-no-input" class="form-label">Roll No.</label>
				<input id="roll-no-input" class="form-control" type="text" required>
				<div class="invalid-feedback">
					Please provide a vaild Roll no.
				</div>
			</div>
			<div class="col-12">
				<input type="checkbox" class="form-check-input" id="conditions-checkbox" required>
				<label for="conditions-checkbox">Agree to terms and conditions</label>
				<div class="invalid-feedback">
					You must agree before submitting.
				</div>
			</div>
			<div class="col-12">
				<button class="btn btn-primary">Submit form</button>
			</div>
		</div>
	</form>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
